name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── GoToSocial federation tests ──────────────────────────────────────────────
  e2e-gotosocial:
    name: E2E — GoToSocial
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # ── Build komentoj image with layer cache ─────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build komentoj image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: komentoj:e2e
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Generate mkcert TLS certs ─────────────────────────────────────────
      - name: Install mkcert
        run: |
          sudo apt-get install -y libnss3-tools
          curl -fsSL "https://dl.filippo.io/mkcert/latest?for=linux/amd64" \
            -o /tmp/mkcert
          sudo install -m 0755 /tmp/mkcert /usr/local/bin/mkcert

      - name: Generate TLS certificates
        run: |
          mkdir -p e2e/gotosocial/certs
          mkcert \
            -cert-file e2e/gotosocial/certs/local.crt \
            -key-file  e2e/gotosocial/certs/local.key \
            komentoj.local gotosocial.local
          cp "$(mkcert -CAROOT)/rootCA.pem" e2e/gotosocial/certs/rootCA.pem

      # ── Start the full stack ──────────────────────────────────────────────
      - name: Start E2E stack
        run: |
          KOMENTOJ_IMAGE=komentoj:e2e \
            docker compose -f e2e/gotosocial/docker-compose.yml up -d --no-build

      # ── Wait for services to be reachable via Caddy HTTPS ────────────────
      - name: Wait for services healthy
        run: |
          RESOLVE="--resolve komentoj.local:443:127.0.0.1 --resolve gotosocial.local:443:127.0.0.1 --resolve gotosocial.local:8888:127.0.0.1"
          CACERT="--cacert e2e/gotosocial/certs/rootCA.pem"

          echo "Waiting for komentoj (via Caddy HTTPS)..."
          for i in $(seq 1 24); do
            if curl -sf $RESOLVE $CACERT 'https://komentoj.local/.well-known/webfinger?resource=acct:komentoj@komentoj.local' >/dev/null 2>&1; then
              echo "komentoj ready"; break
            fi
            sleep 5
          done

          echo "Waiting for GoToSocial (via Caddy HTTPS)..."
          for i in $(seq 1 60); do
            if curl -sf $RESOLVE $CACERT https://gotosocial.local:8888/api/v1/instance >/dev/null 2>&1; then
              echo "gotosocial ready"; break
            fi
            sleep 5
          done

      # ── Run the test suite ────────────────────────────────────────────────
      - name: Run E2E tests
        run: ./e2e/gotosocial/test.sh

      # ── Diagnostics on failure ────────────────────────────────────────────
      - name: Dump service logs
        if: failure()
        run: |
          echo "=== caddy ===" && docker compose -f e2e/gotosocial/docker-compose.yml logs caddy
          echo "=== komentoj ===" && docker compose -f e2e/gotosocial/docker-compose.yml logs komentoj
          echo "=== gotosocial ===" && docker compose -f e2e/gotosocial/docker-compose.yml logs gotosocial

      # ── Always clean up ───────────────────────────────────────────────────
      - name: Tear down
        if: always()
        run: docker compose -f e2e/gotosocial/docker-compose.yml down -v

  # ── Mastodon federation tests ────────────────────────────────────────────────
  e2e-mastodon:
    name: E2E — Mastodon
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      # ── Build komentoj image with layer cache ─────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build komentoj image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: komentoj:e2e
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Generate mkcert TLS certs ─────────────────────────────────────────
      - name: Install mkcert
        run: |
          sudo apt-get install -y libnss3-tools
          curl -fsSL "https://dl.filippo.io/mkcert/latest?for=linux/amd64" \
            -o /tmp/mkcert
          sudo install -m 0755 /tmp/mkcert /usr/local/bin/mkcert

      - name: Generate TLS certificates
        run: |
          mkdir -p e2e/mastodon/certs
          mkcert \
            -cert-file e2e/mastodon/certs/local.crt \
            -key-file  e2e/mastodon/certs/local.key \
            komentoj.local mastodon.local
          cp "$(mkcert -CAROOT)/rootCA.pem" e2e/mastodon/certs/rootCA.pem

      # ── Generate Mastodon VAPID keys ──────────────────────────────────────
      - name: Generate VAPID keys
        run: |
          VAPID_OUTPUT=$(docker run --rm ghcr.io/mastodon/mastodon:latest \
            bundle exec rake mastodon:webpush:generate_vapid_key 2>/dev/null)
          echo "VAPID_PRIVATE_KEY=$(echo "$VAPID_OUTPUT" | grep VAPID_PRIVATE_KEY | cut -d= -f2-)" >> "$GITHUB_ENV"
          echo "VAPID_PUBLIC_KEY=$(echo "$VAPID_OUTPUT"  | grep VAPID_PUBLIC_KEY  | cut -d= -f2-)" >> "$GITHUB_ENV"

      # ── Start the full stack ──────────────────────────────────────────────
      - name: Start E2E stack
        run: |
          KOMENTOJ_IMAGE=komentoj:e2e \
            docker compose -f e2e/mastodon/docker-compose.yml up -d --no-build

      # ── Wait for services to be reachable via Caddy HTTPS ────────────────
      - name: Wait for services healthy
        run: |
          RESOLVE="--resolve komentoj.local:443:127.0.0.1 --resolve mastodon.local:443:127.0.0.1"
          CACERT="--cacert e2e/mastodon/certs/rootCA.pem"

          echo "Waiting for komentoj (via Caddy HTTPS)..."
          for i in $(seq 1 24); do
            if curl -sf $RESOLVE $CACERT 'https://komentoj.local/.well-known/webfinger?resource=acct:komentoj@komentoj.local' >/dev/null 2>&1; then
              echo "komentoj ready"; break
            fi
            sleep 5
          done

          echo "Waiting for Mastodon (via Caddy HTTPS)..."
          for i in $(seq 1 72); do
            if curl -sf $RESOLVE $CACERT https://mastodon.local/health >/dev/null 2>&1; then
              echo "mastodon ready"; break
            fi
            sleep 5
          done

      # ── Run the test suite ────────────────────────────────────────────────
      - name: Run E2E tests
        run: ./e2e/mastodon/test.sh

      # ── Diagnostics on failure ────────────────────────────────────────────
      - name: Dump service logs
        if: failure()
        run: |
          echo "=== caddy ===" && docker compose -f e2e/mastodon/docker-compose.yml logs caddy
          echo "=== komentoj ===" && docker compose -f e2e/mastodon/docker-compose.yml logs komentoj
          echo "=== mastodon-web ===" && docker compose -f e2e/mastodon/docker-compose.yml logs mastodon-web
          echo "=== mastodon-sidekiq ===" && docker compose -f e2e/mastodon/docker-compose.yml logs mastodon-sidekiq

      # ── Always clean up ───────────────────────────────────────────────────
      - name: Tear down
        if: always()
        run: docker compose -f e2e/mastodon/docker-compose.yml down -v
