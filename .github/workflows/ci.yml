name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://komentoj:komentoj@localhost:5432/komentoj_test

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: komentoj
          POSTGRES_PASSWORD: komentoj
          POSTGRES_DB: komentoj_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --locked

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Test (unit + integration)
        run: cargo test --locked
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          # Silence sqlx compile-time checks (tests use runtime queries)
          SQLX_OFFLINE: false
