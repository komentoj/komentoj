# E2E federation test environment
#
# Caddy terminates TLS for both domains; GTS and komentoj communicate with
# each other exclusively over HTTPS (via Caddy) just like in production.
#
# One-time local setup:
#   ./e2e/setup.sh        # installs mkcert, generates certs, updates /etc/hosts
#
# Usage (local):
#   docker compose -f docker-compose.e2e.yml up -d
#   ./e2e/test.sh
#   docker compose -f docker-compose.e2e.yml down -v
#
# In CI, set KOMENTOJ_IMAGE to a pre-built image tag to skip the build step:
#   KOMENTOJ_IMAGE=komentoj:e2e docker compose -f docker-compose.e2e.yml up -d --no-build

networks:
  fedi:
    driver: bridge

services:
  # ── Postgres for komentoj ────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: komentoj
      POSTGRES_PASSWORD: komentoj
      POSTGRES_DB: komentoj
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U komentoj"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fedi

  # ── Postgres for GoToSocial ──────────────────────────────────────────────────
  gts-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gotosocial
      POSTGRES_PASSWORD: gotosocial
      POSTGRES_DB: gotosocial
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotosocial"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fedi

  # ── Redis (for komentoj actor cache) ────────────────────────────────────────
  redis:
    image: redis:7
    networks:
      - fedi

  # ── komentoj ────────────────────────────────────────────────────────────────
  komentoj:
    image: ${KOMENTOJ_IMAGE:-komentoj:local}
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/e2e/entrypoint.sh"]
    volumes:
      - ./e2e/komentoj.toml:/config/config.toml:ro
      - ./e2e/certs:/e2e/certs:ro
      - ./e2e/entrypoint.sh:/e2e/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fedi
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:8080/.well-known/webfinger?resource=acct:komentoj@komentoj.local' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── GoToSocial ───────────────────────────────────────────────────────────────
  # GTS binds to HTTP port 8888 normally; Caddy terminates TLS on port 8888.
  # GTS_PORT=8888 + GTS_PROTOCOL=https → GTS generates https://gotosocial.local:8888/…
  gotosocial:
    image: superseriousbusiness/gotosocial:0.20.3
    environment:
      GTS_HOST: gotosocial.local
      GTS_PORT: "8888"
      GTS_PROTOCOL: https
      GTS_LETSENCRYPT_ENABLED: "false"
      GTS_DB_TYPE: postgres
      GTS_DB_ADDRESS: gts-postgres
      GTS_DB_PORT: "5432"
      GTS_DB_USER: gotosocial
      GTS_DB_PASSWORD: gotosocial
      GTS_DB_DATABASE: gotosocial
      GTS_ACCOUNTS_REGISTRATION_OPEN: "true"
      GTS_ACCOUNTS_APPROVAL_REQUIRED: "false"
      GTS_ACCOUNTS_REASON_REQUIRED: "false"
      GTS_LOG_LEVEL: warn
      # Trust the mkcert CA so GTS can make HTTPS requests to Caddy-fronted services
      SSL_CERT_FILE: /e2e/certs/rootCA.pem
      # Allow GTS to reach services on the Docker bridge network.
      # By default GTS blocks all private/reserved IP ranges (SSRF protection).
      GTS_HTTP_CLIENT_ALLOW_IPS: "172.16.0.0/12"
    volumes:
      - ./e2e/certs:/e2e/certs:ro
    depends_on:
      gts-postgres:
        condition: service_healthy
    networks:
      - fedi

  # ── Caddy (TLS termination + reverse proxy) ──────────────────────────────────
  # Both komentoj.local and gotosocial.local resolve to Caddy inside the Docker
  # network, so all inter-service traffic goes through HTTPS just as in prod.
  caddy:
    image: caddy:2
    volumes:
      - ./e2e/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./e2e/certs:/etc/caddy/certs:ro
    ports:
      - "443:443"
      - "8888:8888"
    networks:
      fedi:
        aliases:
          - komentoj.local
          - gotosocial.local
    depends_on:
      - komentoj
      - gotosocial
