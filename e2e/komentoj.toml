[server]
host = "0.0.0.0"
port = 8080

[instance]
domain       = "komentoj.local"
protocol     = "https"
username     = "komentoj"
display_name = "Komentoj E2E"
summary      = "Local E2E test instance"
blog_domains = ["gotosocial.local"]

[database]
url             = "postgres://komentoj:komentoj@postgres:5432/komentoj"
max_connections = 5

[redis]
url             = "redis://redis:6379"
actor_cache_ttl = 3600

[cors]
allowed_origins = ["https://gotosocial.local"]

[admin]
token = "e2e-test-admin-token"
