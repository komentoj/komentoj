repos:
  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --
        types: [rust]
        pass_filenames: true

      - id: clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --locked -- -D warnings
        types: [rust]
        pass_filenames: false
